<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>模型配置 - COZE 工作流生成工具</title>
    <link rel="stylesheet" href="/workflow.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">MODEL CONFIG</p>
      <h1>模型配置</h1>
      <p class="lead">配置 OpenAI-compatible 大模型，用于后续需求澄清与生成增强。</p>
      <a class="text-link" href="/workflow.html">返回工作流生成工具</a>
    </header>
    <main class="stage-shell">
      <section class="stage-card">
        <label for="provider">Provider</label>
        <input id="provider" value="openai-compatible" />
        <label for="base-url">Base URL</label>
        <input id="base-url" placeholder="https://api.example.com/v1" />
        <label for="model">Model</label>
        <input id="model" placeholder="gpt-4o-mini" />
        <label for="api-key">API Key</label>
        <input id="api-key" type="password" placeholder="保存后会被隐藏" />
        <label for="temperature">Temperature</label>
        <input id="temperature" type="number" min="0" max="2" step="0.1" value="0.2" />
        <label><input id="enabled" type="checkbox" /> 启用模型</label>
        <div class="action-row">
          <button id="save">保存配置</button>
          <button id="test" class="secondary">测试连接</button>
        </div>
        <p id="status" class="status">配置保存在当前 Coze 工具项目内。</p>
      </section>
    </main>
    <script src="/model-config.js"></script>
  </body>
</html>
