<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>COZE 工作流生成工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/workflow.css" />
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">COZE WORKFLOW DESIGNER</p>
      <h1>COZE 工作流生成工具</h1>
      <p class="lead">独立程序，专注需求沟通、方案设计、节点编排与提示词生成。</p>
      <a class="text-link" href="/model-config.html">模型配置</a>
    </header>

    <main class="stage-shell">
      <nav class="stage-tabs" aria-label="生成阶段">
        <button class="stage-tab active" data-stage="communication">需求沟通</button>
        <button class="stage-tab" data-stage="solution">方案概览</button>
        <button class="stage-tab" data-stage="orchestration">节点编排</button>
      </nav>

      <section class="stage-panel active" id="communication">
        <article class="stage-card">
          <div id="chat-log" class="chat-log" aria-live="polite"></div>
          <div id="generation-progress" class="generation-progress" hidden></div>
          <div class="composer-presets" aria-label="预设需求">
            <button class="preset-chip" type="button" data-requirement="设计一个售后客服对话流。用户输入问题描述、订单信息和情绪状态，系统需要识别售后意图，查询知识库和订单接口，判断是否需要人工介入，最后输出解决方案、安抚话术和工单摘要。">售后客服</button>
            <button class="preset-chip" type="button" data-requirement="设计一个新人入职助手。用户输入岗位、层级、入职阶段和当前困惑，工作流需要检索公司制度知识库，生成 30/60/90 天入职计划、关键任务清单、沟通话术和风险提醒。">入职助手</button>
            <button class="preset-chip" type="button" data-requirement="设计一个销售线索评估工作流。用户输入客户行业、规模、预算、需求描述和沟通记录，系统需要识别购买意向，查询 CRM 或数据库，给出线索评分、跟进优先级和下一步沟通建议。">销售线索</button>
            <button class="preset-chip" type="button" data-requirement="设计一个内容选题与文案生成工作流。用户输入产品、目标人群、渠道和营销目标，系统需要分析卖点，检索素材知识库，生成多个选题方向、正文草稿、标题和发布建议。">内容文案</button>
          </div>
          <div class="chat-composer" aria-label="需求输入">
            <textarea id="requirement" rows="2" placeholder="先输入需求，系统会判断是否需要追问。也可以点击上方预设后继续补充。"></textarea>
            <button id="clarify" class="send-button" type="button" aria-label="发送">↑</button>
            <button id="generate" hidden disabled>生成方案</button>
          </div>
          <p id="status" class="status visually-hidden">先输入需求，系统会判断是否需要追问。</p>
        </article>
      </section>

      <section class="stage-panel" id="solution">
        <article class="stage-card">
          <div id="solution-empty" class="empty">生成后这里会展示方案设计。</div>
          <div id="solution-content" hidden>
            <div id="solution-summary" class="solution-grid"></div>
            <section class="solution-section">
              <h2>生成阶段</h2>
              <ol id="solution-stages" class="stage-list"></ol>
            </section>
            <section class="solution-section">
              <h2>方案说明</h2>
              <ul id="solution-overview" class="overview-list"></ul>
            </section>
            <button id="go-orchestration">查看节点编排</button>
          </div>
        </article>
      </section>

      <section class="stage-panel" id="orchestration">
        <article class="stage-card">
          <div id="orchestration-empty" class="empty">生成后这里会展示流程图和节点设计。</div>
          <div id="orchestration-content" hidden>
            <div id="execution-summary" class="execution-summary"></div>
            <div class="diagram-detail-layout">
              <div id="diagram" class="diagram-wrap"></div>
              <aside id="selected-node" class="selected-node">点击流程图节点查看设计、提示词和 Coze 文档。</aside>
            </div>
            <details class="node-list-details">
              <summary>全部节点设计</summary>
              <div id="nodes"></div>
            </details>
            <details class="node-list-details">
              <summary>JSON 蓝图</summary>
              <pre id="json"></pre>
            </details>
            <details class="node-list-details">
              <summary>COZE YAML 蓝图</summary>
              <pre id="yaml"></pre>
            </details>
          </div>
        </article>
      </section>
    </main>

    <script src="/workflow.js"></script>
  </body>
</html>
